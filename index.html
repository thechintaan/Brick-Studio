<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tile Frames</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;}
  body{display:flex;align-items:center;justify-content:center;background:#F4F5F7;color:#181D27;}
  .card{background:#fff;border:1px solid #E9EAEB;border-radius:16px;box-shadow:0 1px 3px rgba(16,24,40,.08);padding:40px;max-width:420px;width:calc(100% - 32px);}
  h1{font-size:22px;margin:0 0 4px;letter-spacing:-.02em;}
  p{margin:0 0 24px;color:#535862;font-size:14px;}
  a.app{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border:1px solid #E9EAEB;border-radius:10px;text-decoration:none;color:#181D27;font-weight:600;font-size:15px;margin-bottom:10px;transition:background .15s ease;}
  a.app:hover{background:#FAFAFA;}
  a.app span.arrow{color:#A4A7AE;}
</style>
</head>
<body>
  <div class="card">
    <h1>Tile Frames</h1>
    <p>Open a studio:</p>
    <a class="app" href="./Mosaic%20Studio.dc.html">Mosaic Studio <span class="arrow">&rarr;</span></a>
    <a class="app" href="./Brick%20Studio.dc.html">Brick Studio <span class="arrow">&rarr;</span></a>
  </div>
</body>
</html>
